<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 160 160" width="64" height="64"
     aria-label="タコ星人（火星人）" role="img">
  <defs>
    <radialGradient id="mbody" cx="50%" cy="35%">
      <stop offset="0%"  stop-color="#ff9b7c"/>
      <stop offset="65%" stop-color="#ff7a57"/>
      <stop offset="100%" stop-color="#f05a3d"/>
    </radialGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="s"/>
      <feOffset dy="0.6" result="o"/>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <mask id="blinkMask">
      <rect x="0" y="0" width="160" height="160" fill="#fff"/>
      <rect id="lid" x="40" y="56" width="80" height="0" fill="#000">
        <animate attributeName="height" values="0;40;0"
                 dur="4.2s" repeatCount="indefinite" keyTimes="0;0.015;0.03"/>
      </rect>
    </mask>

    <linearGradient id="legHL" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd0c2" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffd0c2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <ellipse cx="80" cy="128" rx="34" ry="9" fill="#000" opacity=".10"/>

  <g filter="url(#soft)" stroke="#7a2d16" stroke-width="2.5" stroke-linejoin="round">
    <path d="M80,40 C62,40 48,54 48,74 C48,94 60,102 70,106
             C74,108 86,108 90,106 C100,102 112,94 112,74
             C112,54 98,40 80,40 Z" fill="url(#mbody)"/>

    <!-- 腕：各パス内にアニメを直書き -->
    <path d="M58,98 C48,92 42,86 42,78 C42,70 50,68 56,72
             C60,74 60,80 56,82 C54,83 52,82 51,80"
          fill="none">
      <animateTransform attributeName="transform" type="rotate"
        values="-6 56 88;6 56 88;-6 56 88" dur="3.6s" repeatCount="indefinite"/>
    </path>
    <path d="M102,98 C112,92 118,86 118,78 C118,70 110,68 104,72
             C100,74 100,80 104,82 C106,83 108,82 109,80"
          fill="none">
      <animateTransform attributeName="transform" type="rotate"
        values="6 104 88;-6 104 88;6 104 88" dur="3.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g stroke="#7a2d16" stroke-width="2.5" fill="#ff7a57" stroke-linecap="round" filter="url(#soft)">
    <path d="M64,104 C62,124 66,140 72,148"/>
    <path d="M74,104 C72,126 76,142 80,150"/>
    <path d="M86,104 C88,126 84,142 80,150"/>
    <path d="M96,104 C98,124 94,140 88,148"/>
    <path d="M64,104 C62,124 66,140 72,148" stroke="url(#legHL)"/>
    <path d="M74,104 C72,126 76,142 80,150" stroke="url(#legHL)"/>
    <path d="M86,104 C88,126 84,142 80,150" stroke="url(#legHL)"/>
    <path d="M96,104 C98,124 94,140 88,148" stroke="url(#legHL)"/>
  </g>

  <g mask="url(#blinkMask)">
    <ellipse cx="66" cy="78" rx="12" ry="10" fill="#fff"/>
    <ellipse cx="94" cy="78" rx="12" ry="10" fill="#fff"/>
    <circle cx="69" cy="79" r="4.2" fill="#2b1d1b"/>
    <circle cx="91" cy="79" r="4.2" fill="#2b1d1b"/>
    <circle cx="67.5" cy="77" r="1.6" fill="#fff"/>
    <circle cx="92.5" cy="77" r="1.6" fill="#fff"/>
  </g>

  <path d="M74,90 Q80,96 86,90" fill="none" stroke="#7a2d16" stroke-width="2.5" stroke-linecap="round"/>

  <ellipse cx="56" cy="88" rx="6.5" ry="4.5" fill="#ffb4a4" opacity=".55"/>
  <ellipse cx="104" cy="88" rx="6.5" ry="4.5" fill="#ffb4a4" opacity=".55"/>
</svg>

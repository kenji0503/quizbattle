<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 200" width="64" height="64"
     aria-label="ロケット" role="img">
  <defs>
    <!-- 炎のグラデーション -->
    <linearGradient id="flameGradR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff59d"/>
      <stop offset="60%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#ff5252"/>
    </linearGradient>
    <!-- 炎の内側（少し明るめ） -->
    <linearGradient id="flameGradInnerR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fffbd1"/>
      <stop offset="70%" stop-color="#ffc07a"/>
      <stop offset="100%" stop-color="#ff7a66"/>
    </linearGradient>
    <!-- ぼんやり発光 -->
    <filter id="flameGlowR">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 火の粉 -->
    <radialGradient id="sparkGradR" cx="50%" cy="50%">
      <stop offset="0%"  stop-color="#ffe9a6"/>
      <stop offset="100%" stop-color="#ff7a66" stop-opacity="0.2"/>
    </radialGradient>
    <symbol id="sparkR" viewBox="-2 -2 4 4">
      <circle r="1.6" fill="url(#sparkGradR)"/>
    </symbol>
  </defs>

  <!-- 本体（-30度傾けて進行方向っぽく） -->
  <g transform="translate(100,120) rotate(-30)">
    <!-- 機体 -->
    <path d="M0,-60 C20,-40 20,30 0,50 C-20,30 -20,-40 0,-60Z" fill="#ffffff"/>
    <circle cx="0" cy="-30" r="8" fill="#69f0ff"/>
    <path d="M-20,20 L0,10 L20,20 L0,40 Z" fill="#ff6f6f"/>

    <!-- 炎の“光”(発光) -->
    <ellipse cx="0" cy="80" rx="14" ry="26"
             fill="#ff8a65" opacity=".28" filter="url(#flameGlowR)"/>

    <!-- 炎（外側）…形状そのものをモーフィングして“ゆらぎ” -->
    <path id="flameOuterR"
          d="M0,48 Q-8,66 0,86 Q8,66 0,48Z"
          fill="url(#flameGradR)">
      <animate attributeName="d" dur="0.7s" repeatCount="indefinite"
        values="M0,48 Q-8,66 0,86 Q8,66 0,48Z;
                M0,48 Q-12,70 0,96 Q12,70 0,48Z;
                M0,48 Q-6,60 0,80 Q6,60 0,48Z;
                M0,48 Q-8,66 0,86 Q8,66 0,48Z"/>
      <animate attributeName="opacity" dur="0.7s" repeatCount="indefinite"
        values="1;0.9;1;0.95;1"/>
    </path>

    <!-- 炎（内側）…短めで独立に揺らす -->
    <path id="flameInnerR"
          d="M0,50 Q-5,64 0,78 Q5,64 0,50Z"
          fill="url(#flameGradInnerR)" opacity=".95">
      <animate attributeName="d" dur="0.55s" repeatCount="indefinite"
        values="M0,50 Q-5,64 0,78 Q5,64 0,50Z;
                M0,50 Q-7,66 0,86 Q7,66 0,50Z;
                M0,50 Q-4,60 0,74 Q4,60 0,50Z;
                M0,50 Q-5,64 0,78 Q5,64 0,50Z"/>
      <animate attributeName="opacity" dur="0.55s" repeatCount="indefinite"
        values="0.95;0.8;1;0.9;0.95"/>
    </path>

    <!-- 火の粉（複数・時間差で落ちて消える） -->
    <g>
      <!-- 1 -->
      <use href="#sparkR" x="-2" y="58" opacity="0.9">
        <animate attributeName="x" values="-2;-8;-5" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="58;110" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.0" dur="0.9s" repeatCount="indefinite"/>
      </use>
      <!-- 2 -->
      <use href="#sparkR" x="3" y="60" opacity="0.9">
        <animate attributeName="x" values="3;7;0" dur="1.0s" begin=".15s" repeatCount="indefinite"/>
        <animate attributeName="y" values="60;112" dur="1.0s" begin=".15s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.0" dur="1.0s" begin=".15s" repeatCount="indefinite"/>
      </use>
      <!-- 3 -->
      <use href="#sparkR" x="-1" y="62" opacity="0.9">
        <animate attributeName="x" values="-1;4;-3" dur="0.85s" begin=".32s" repeatCount="indefinite"/>
        <animate attributeName="y" values="62;108" dur="0.85s" begin=".32s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.0" dur="0.85s" begin=".32s" repeatCount="indefinite"/>
      </use>
      <!-- 4 -->
      <use href="#sparkR" x="0" y="56" opacity="0.9">
        <animate attributeName="x" values="0;-5;2" dur="1.1s" begin=".5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="56;116" dur="1.1s" begin=".5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.0" dur="1.1s" begin=".5s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>
</svg>

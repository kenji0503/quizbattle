# battle-test.quizbattle.jp 専用の nginx 設定例
#
# 重要:
# - この設定は battle-test 用 server block にだけ追加する
# - 既存の speed-test / production 用 server block は変更しない
# - 既存の共通 /ws 設定を上書きしない

server {
    listen 443 ssl http2;
    server_name battle-test.quizbattle.jp;

    root /var/www/projects/battle-test/server/public;
    index index.php index.html;

    # 既存の battle-test 用 PHP 配信設定はここに合わせてください

    location /ws {
        proxy_pass http://127.0.0.1:8085/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

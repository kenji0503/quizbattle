# battle-test.quizbattle.jp 専用の Apache 設定例
#
# 重要:
# - この設定は battle-test 用 VirtualHost にだけ追加する
# - 既存の speed-test / production 用 VirtualHost は変更しない
# - 既存の共通 /ws 設定を上書きしない

<VirtualHost *:443>
    ServerName battle-test.quizbattle.jp
    DocumentRoot /var/www/projects/battle-test/server/public

    # 既存の battle-test 用 PHP 配信設定はここに合わせてください

    ProxyPreserveHost On
    ProxyPass /ws ws://127.0.0.1:8085/ws
    ProxyPassReverse /ws ws://127.0.0.1:8085/ws
</VirtualHost>
